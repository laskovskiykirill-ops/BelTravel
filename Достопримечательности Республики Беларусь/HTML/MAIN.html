<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BelTravel — Достопримечательности Беларуси</title>
    <link rel="stylesheet" href="../CSS/main.css">
    <link rel="stylesheet" href="../CSS/Base.css">
</head>
<body>
    <header class="menu">
        <div class="logo"><img class="imgLogo" src="../IMGs/Logo.svg" alt="Logo">BelTravel</div>
        
        <nav class="nav-links">
            <div class="toMain" id="main">Главная</div>
            <div class="contact" id="contacts">Наши контакты</div>
            <div class="aboutUs" id="aboutUs">О нас</div>
        </nav>     
    </header>

    <main class="main">
        <div class="region" id="vitebsk">
            <figure class="img"><img src="../IMGs/Vitebsk.jpg" alt="Витебская область"></figure>
            <div class="name">Витебская область</div>
        </div>
        <div class="region" id="minsk">
            <figure class="img"><img src="../IMGs/Minsk.jpg" alt="Минская область"></figure>
            <div class="name">Минская область</div>
        </div>
        <div class="region" id="mogilev">
            <figure class="img"><img src="../IMGs/Mogilev.jpg" alt="Могилевская область"></figure>
            <div class="name">Могилевская область</div>
        </div>
        <div class="region" id="gomel">
            <figure class="img"><img src="../IMGs/Gomel.jpg" alt="Гомельская область"></figure>
            <div class="name">Гомельская область</div>
        </div>
        <div class="region" id="brest">
            <figure class="img"><img src="../IMGs/Brest.jpg" alt="Брестская область"></figure>
            <div class="name">Брестская область</div>
        </div>
        <div class="region" id="grodno">
            <figure class="img"><img src="../IMGs/Grodno.jpg" alt="Гродненская область"></figure>
            <div class="name">Гродненская область</div>
        </div>
    </main>

    <footer>
        <div class="footerText">BelTravel | Достопримечательности Беларуси: замки, пущи, история. Присоединяйтесь к нам в путешествиях!</div>
    </footer>

    <script src="../JS/main.js"></script>
    <script src="../JS/menu.js"></script>
</body>
</html>
